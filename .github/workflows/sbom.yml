name: Generate SBOM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Download sbom-tool binary
        run: |
          curl -Lo sbom-tool https://github.com/microsoft/sbom-tool/releases/download/v4.1.5/sbom-tool-linux-x64
          chmod +x sbom-tool

      - name: Generate SBOM
        run: |
          mkdir -p ${{ github.workspace }}/_manifest
          ./sbom-tool generate \
            -b ${{ github.workspace }} \
            -bc ${{ github.workspace }} \
            -pn sbom-demo \
            -pv 1.0.0 \
            -ps Upward \
            -nsb https://github.com/angelzero10/sbom-demo \
            -m ${{ github.workspace }}/_manifest

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-manifest
          path: _manifest/
